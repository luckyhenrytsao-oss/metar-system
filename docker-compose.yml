# FastAPI + Redis 本地编排
# 用法:
#   docker compose up -d --build
#   docker compose logs -f web
#   docker compose down

services:
  redis:
    image: redis:7-alpine
    container_name: metar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis-data:/data
    networks:
      - metar-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    image: ghcr.io/luckyhenrytsao-oss/metar-system:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metar-web
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # 挂载 LDM 写入的 METAR 文件，供 M2 采集器读取
      - ./m2-ldm/data:/app/ldm_data:ro
    networks:
      - metar-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  m2-ldm:
    image: unidata/ldm-docker:latest
    container_name: m2-ldm
    restart: unless-stopped
    hostname: m2-ldm
    environment:
      # LDM 容器内以 UID/GID=1000 运行，宿主机目录需对该用户可写
      - LDM_USER_ID=1000
      - LDM_GROUP_ID=1000
    volumes:
      - ./m2-ldm/ldmd.conf:/home/ldm/etc/ldmd.conf
      - ./m2-ldm/pqact.conf:/home/ldm/etc/pqact.conf
      - ./m2-ldm/data:/home/ldm/var/data
      - ./m2-ldm/logs:/home/ldm/var/logs
      - ./m2-ldm/queues:/home/ldm/var/queues
    networks:
      - metar-net

networks:
  metar-net:
    driver: bridge

volumes:
  redis-data:
