# FastAPI + Redis 本地编排
# 用法:
#   docker compose up -d --build
#   docker compose logs -f web
#   docker compose down

services:
  redis:
    image: redis:7-alpine
    container_name: metar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis-data:/data
    networks:
      - metar-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    image: ghcr.io/luckyhenrytsao-oss/metar-system:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metar-web
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - metar-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  metar-net:
    driver: bridge

volumes:
  redis-data:
