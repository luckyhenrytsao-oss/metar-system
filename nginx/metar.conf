# METAR 系统 Nginx 反向代理配置
# 放置位置：/etc/nginx/default.d/metar.conf
# 要求：/etc/nginx/nginx.conf 的默认 server 块已包含 "include /etc/nginx/default.d/*.conf;"
#
# 说明：
#   - 该配置把公网 80 端口反向代理到本机 FastAPI 的 127.0.0.1:8000
#   - 保留后端 ETag，确保 HTTP 304 Not Modified 逻辑正常工作
#   - 关闭代理缓存与缓冲，避免干扰实时响应

location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_hide_header X-Powered-By;
    etag on;
    proxy_buffering off;
    proxy_cache off;
}
